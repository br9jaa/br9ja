  <style>
    :root {

      color: var(--br9-text);

    a,

      inset: 0;
      z-index: 999;
      overflow-y: auto;

      opacity: 0;

    .hub-shell {
      max-width: 1280px;
      margin: 0 auto;

      gap: 24px;

    .section-panel,
    .hub-ticker,
    .partner-bar,

      background: var(--br9-surface);

    .hero-br9 {

    .hero-br9__background {

      inset: 0;
      pointer-events: none;

<body>
  <div id="landing-shell"></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script type="module">
    import { renderHero } from './components/Hero.js';
    import { renderTrustSection } from './components/TrustSection.js';

    const shell = document.getElementById('landing-shell');
    const params = new URLSearchParams(window.location.search);
    const shouldOpenWeb = params.get('play') === 'web';

    shell.innerHTML = `
      <main class="hub-shell">
        ${renderHero()}
        ${renderTrustSection()}
      </main>
    `;

    const hideLandingShell = () => {
      shell.classList.add('landing-shell--hidden');
    };

    const validators = {
      phone: (value) => value.replace(/\D/g, '').length >= 10,
      amount: (value) => Number(value) >= 100,
      meter: (value) => value.replace(/\s/g, '').length >= 10,
      decoder: (value) => value.replace(/\s/g, '').length >= 8,
    };

    const markFieldValidity = (input) => {
      const validatorName = input.getAttribute('data-validate');
      const validator = validators[validatorName];
      if (!validator) {
        return;
      }

      const isValid = validator(input.value);
      const fieldShell = input.closest('.field-shell');
      const status = input.closest('.service-card')?.querySelector('.field-status');
      fieldShell?.classList.toggle('field-shell--valid', isValid);

      if (!status) {
        return;
      }

      status.classList.toggle('field-status--valid', isValid);
      status.textContent = isValid
        ? '✓ Success'
        : status.getAttribute('data-default') ?? '';
    };

    if (shouldOpenWeb) {
      hideLandingShell();
    }

    document.querySelectorAll('[data-validate]').forEach((input) => {
      markFieldValidity(input);
    });

    document.addEventListener('input', (event) => {
      const input = event.target.closest('[data-validate]');
      if (!input) {
        return;
      }
      markFieldValidity(input);
    });

    document.addEventListener('click', (event) => {
      const target = event.target.closest('[data-br9-action]');
      if (!target) {
        return;
      }
      const action = target.getAttribute('data-br9-action');

      if (action === 'start-gaming' || action === 'download-play') {
        window.open(
          'https://play.google.com/store/apps/details?id=com.bayright9ja.bayright9ja_mobile',
          '_blank',
          'noopener,noreferrer',
        );
        return;
      }

      if (action === 'download-ios') {
        window.open(
          'https://apps.apple.com/app/id0000000000',
          '_blank',
          'noopener,noreferrer',
        );
        return;
      }

      hideLandingShell();
      const hash = action === 'quick-bill-pay' || action === 'open-web-wallet' ? '#/login' : '#/login';
      window.history.replaceState({}, '', `${window.location.pathname}?play=web${hash}`);
    });
  </script>
