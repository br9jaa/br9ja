<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BR9ja</title>
  <meta name="description" content="Reset your BR9ja password with your email or phone number, enter the reset code, and log back in automatically.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://br9.ng/reset-password">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <script defer src="./main.js"></script>
</head>
<body data-page="reset-password" data-base=".">
  <div class="site-shell">
    <div data-site-shell></div>

    <main class="auth-shell">
      <section class="auth-card auth-card--reset" data-auth-card>
        <div class="auth-card__header">
          <h1>Forgot Password?</h1>
          <p class="auth-card__copy">We'll send a code to verify it's you.</p>
        </div>

        <form class="admin-form" data-form="password-reset">
          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">✉</span>
              <input id="reset-identity" name="identity" type="text" placeholder="Email or phone" required aria-label="Email or phone">
            </div>
          </div>

          <button class="action-button" type="button" data-reset-send>Send Reset Code</button>

          <div class="auth-reveal auth-reveal--reset" data-reset-reveal>
            <p class="mini-note">Check your email or phone for the reset code, then come back here and enter it to continue.</p>

            <div class="field-group">
              <div class="field-shell">
                <span class="field-icon">#</span>
                <input id="reset-code" name="code" type="text" inputmode="numeric" maxlength="6" placeholder="Reset code" data-validate="otp" aria-label="Reset code">
              </div>
            </div>

            <div class="field-group">
              <div class="field-shell field-shell--with-action">
                <span class="field-icon">🔒</span>
                <input id="reset-password" name="password" type="password" placeholder="New password" data-validate="password" aria-label="New password">
                <button class="field-inline-action" type="button" data-toggle-password="#reset-password" aria-label="Show or hide password">
                  <span class="field-inline-action__icon">◌</span>
                </button>
              </div>
            </div>

            <button class="action-button" type="submit">Reset Password</button>
          </div>

          <a class="ghost-button" href="./login.html">Back to Login</a>
          <div class="success-banner" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <a class="floating-whatsapp" href="#" data-config-link="whatsappHelp" aria-label="Chat with BR9ja on WhatsApp"></a>
</body>
</html>
