<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BR9ja</title>
  <meta name="description" content="Reset your BR9ja password with your email or phone number, enter the reset code, and log back in automatically.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://br9.ng/reset-password">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <script defer src="./main.js"></script>
</head>
<body data-page="reset-password" data-base=".">
  <div class="site-shell">
    <div data-site-shell></div>

    <main class="auth-shell">
      <section class="auth-card" data-auth-card>
        <div class="auth-card__header">
          <span class="kicker">Password Reset</span>
          <h1>Reset your password without drama.</h1>
          <p class="auth-card__copy">Enter your email or phone number, receive the reset code, create a new password twice, and BR9ja logs you back in automatically.</p>
        </div>

        <form class="admin-form" data-form="password-reset">
          <div class="field-group">
            <label for="reset-identity">Email or Phone Number</label>
            <div class="field-shell">
              <span class="field-icon">✉</span>
              <input id="reset-identity" name="identity" type="text" placeholder="Enter your email or phone number" required>
            </div>
          </div>

          <button class="verify-button verify-button--whatsapp" type="button" data-reset-send>Send Reset Code</button>

          <div class="field-group">
            <label for="reset-code">Reset Code</label>
            <div class="field-shell">
              <span class="field-icon">#</span>
              <input id="reset-code" name="code" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit code" data-validate="otp" required>
            </div>
          </div>

          <div class="field-group">
            <label for="reset-password">New Password</label>
            <div class="field-shell">
              <span class="field-icon">🔒</span>
              <input id="reset-password" name="password" type="password" placeholder="Create a new password" data-validate="password" required>
            </div>
          </div>

          <div class="field-group">
            <label for="reset-password-repeat">Repeat New Password</label>
            <div class="field-shell">
              <span class="field-icon">🔒</span>
              <input id="reset-password-repeat" name="confirmPassword" type="password" placeholder="Repeat the new password" data-validate="password" required>
            </div>
          </div>

          <button class="action-button" type="submit">Reset and Login</button>
          <a class="ghost-button" href="./login.html">Back to Login</a>
          <div class="success-banner">Use the reset code flow if you forgot your password.</div>
        </form>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <a class="floating-whatsapp" href="#" data-config-link="whatsappHelp" aria-label="Chat with BR9ja on WhatsApp"></a>
</body>
</html>
