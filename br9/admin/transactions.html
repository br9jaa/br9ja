<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BR9ja The Vault</title>
  <meta name="description" content="Private BR9ja vault for transactions, silent profit visibility, date filtering, and export.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../main.css">
  <script defer src="../main.js"></script>
</head>
<body data-page="admin-vault" data-base=".." data-authenticated="true" data-admin-room="vault">
  <div class="admin-layout">
    <div data-admin-shell></div>

    <main class="section-stack admin-room">
      <section class="section-panel admin-console">
        <div class="section-header">
          <span class="kicker">The Vault</span>
          <h1 class="section-title">Every completed movement, one ledger.</h1>
          <p class="section-copy">Utility payments, internal transfers, and admin-led balance events all pass through this room so reports stay sponsor-ready.</p>
        </div>

        <form class="admin-filter-form" data-form="vault-filter">
          <div class="field-group">
            <label for="vault-start-date">Start Date</label>
            <div class="field-shell">
              <input id="vault-start-date" name="startDate" type="date">
            </div>
          </div>
          <div class="field-group">
            <label for="vault-end-date">End Date</label>
            <div class="field-shell">
              <input id="vault-end-date" name="endDate" type="date">
            </div>
          </div>
          <button class="action-button" type="submit">Refresh Vault</button>
        </form>

        <div class="admin-toolbar">
          <p class="mini-note" data-transactions-summary>0 transactions in view</p>
          <div class="admin-toolbar__actions">
            <button class="ghost-button" type="button" data-export="csv">Export CSV</button>
            <button class="ghost-button" type="button" data-export="pdf">Export PDF</button>
          </div>
        </div>

        <div class="admin-table-shell">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Reference</th>
                <th>Service</th>
                <th>Amount</th>
                <th>Silent Profit</th>
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody data-transactions-table>
              <tr>
                <td colspan="6">Unlock The Vault to load the current ledger.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div data-admin-gate></div>
</body>
</html>
