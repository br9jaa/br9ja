<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | BR9ja</title>
  <meta name="description" content="Create your BR9ja account with name, username, email, phone number, password, and a 6-digit quick PIN.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://br9.ng/signup">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <script defer src="./main.js"></script>
</head>
<body data-page="signup" data-base=".">
  <div class="site-shell">
    <div data-site-shell></div>

    <main class="auth-shell">
      <section class="auth-card" data-auth-card>
        <div class="auth-card__header">
          <h1>Create Account</h1>
        </div>

        <form class="admin-form" data-form="auth-preview" data-auth-mode="signup">
          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">👤</span>
              <input id="signup-full-name" name="fullName" type="text" placeholder="Full Name" aria-label="Full Name" data-validate="name" required>
            </div>
          </div>

          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">＠</span>
              <input id="signup-username" name="username" type="text" placeholder="Username" aria-label="Username" data-validate="username" required>
            </div>
          </div>

          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">✉</span>
              <input id="signup-email" name="email" type="email" placeholder="Email" aria-label="Email" data-validate="email" required>
            </div>
          </div>

          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">☎</span>
              <input id="signup-phone" name="phone" type="tel" placeholder="Phone Number" aria-label="Phone Number" data-validate="phone" required>
            </div>
          </div>

          <div class="field-group">
            <div class="field-shell field-shell--with-action">
              <span class="field-icon">🔒</span>
              <input id="signup-password" name="password" type="password" placeholder="Password" aria-label="Password" data-validate="password" required>
              <button class="field-inline-action" type="button" data-toggle-password="#signup-password" aria-label="Show password" aria-pressed="false">
                <span class="field-inline-action__icon">👁</span>
              </button>
            </div>
          </div>

          <div class="field-group">
            <div class="field-shell field-shell--with-action">
              <span class="field-icon">🔒</span>
              <input id="signup-password-confirm" name="confirmPassword" type="password" placeholder="Repeat Password" aria-label="Repeat Password" data-validate="password" required>
              <button class="field-inline-action" type="button" data-toggle-password="#signup-password-confirm" aria-label="Show repeated password" aria-pressed="false">
                <span class="field-inline-action__icon">👁</span>
              </button>
            </div>
          </div>

          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">✦</span>
              <input id="signup-pin" name="pin" type="text" inputmode="numeric" maxlength="6" placeholder="6-Digit Quick PIN" aria-label="6-Digit Quick PIN" data-validate="pin" required>
            </div>
          </div>

          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">⤴</span>
              <input id="signup-referral" name="referralCode" type="text" placeholder="Referral Code" aria-label="Referral Code">
            </div>
          </div>

          <button class="action-button" type="submit">Create Account</button>
          <div class="auth-divider"></div>
          <p class="auth-footer-note">Have an account? <a href="./login.html">Login</a>.</p>
          <div class="success-banner" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <a class="floating-whatsapp" href="#" data-config-link="whatsappHelp" aria-label="Chat with BR9ja on WhatsApp"></a>
</body>
</html>
