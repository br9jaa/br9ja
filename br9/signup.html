<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | BR9ja</title>
  <meta name="description" content="Create your BR9ja account with username, password, and a verification choice between SMS and WhatsApp.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://br9.ng/signup">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <script defer src="./main.js"></script>
</head>
<body data-page="signup" data-base=".">
  <div class="site-shell">
    <div data-site-shell></div>

    <main class="auth-shell">
      <section class="auth-card" data-auth-card>
        <div class="auth-card__header">
          <span class="kicker">Create Account</span>
          <h1>Create your BR9ja account</h1>
          <p class="auth-card__copy">Set up your username, password, and 6-digit quick PIN, then choose how you want your verification code delivered.</p>
        </div>

        <form class="admin-form" data-form="auth-preview" data-auth-mode="signup">
          <div class="field-group">
            <label for="signup-username">Username</label>
            <div class="field-shell">
              <span class="field-icon">＠</span>
              <input id="signup-username" name="username" type="text" placeholder="Choose a username" data-validate="username" required>
            </div>
          </div>

          <div class="field-group">
            <label for="signup-email">Email</label>
            <div class="field-shell">
              <span class="field-icon">✉</span>
              <input id="signup-email" name="email" type="email" placeholder="you@example.com" data-validate="email" required>
            </div>
          </div>

          <div class="field-group">
            <label for="signup-phone">Phone Number</label>
            <div class="field-shell">
              <span class="field-icon">☎</span>
              <input id="signup-phone" name="phone" type="tel" placeholder="0801 234 5678" data-validate="phone" required>
            </div>
          </div>

          <div class="field-group">
            <label>Select Verification Method</label>
            <div class="verification-row">
              <button class="verify-button verify-button--whatsapp" type="button" data-verify-trigger="whatsapp">Send WhatsApp Code</button>
              <button class="verify-button verify-button--sms" type="button" data-verify-trigger="sms">Send SMS Code</button>
            </div>
          </div>

          <div class="field-group">
            <label for="signup-otp">OTP Code</label>
            <div class="otp-verify-row">
              <div class="field-shell">
                <span class="field-icon">#</span>
                <input id="signup-otp" name="otp" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit OTP" data-validate="otp" data-otp-input required>
              </div>
              <button class="verify-button verify-button--confirm" type="button" data-otp-verify>Verify</button>
            </div>
          </div>

          <div class="field-group">
            <label for="signup-password">Password</label>
            <div class="field-shell">
              <span class="field-icon">🔒</span>
              <input id="signup-password" name="password" type="password" placeholder="Create a secure password" data-validate="password" required>
            </div>
          </div>

          <div class="field-group">
            <label for="signup-pin">6-Digit Quick PIN</label>
            <div class="field-shell">
              <span class="field-icon">✦</span>
              <input id="signup-pin" name="pin" type="password" inputmode="numeric" maxlength="6" placeholder="123456" data-validate="pin" required>
            </div>
          </div>

          <button class="action-button" type="submit" disabled>Create Account</button>
          <div class="auth-divider"></div>
          <p class="auth-footer-note">Already have an account? <a href="./login.html">Login instead</a>.</p>
          <div class="success-banner">Signup preview ready.</div>
        </form>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <a class="floating-whatsapp" href="#" data-config-link="whatsappHelp">WhatsApp Help</a>
</body>
</html>
