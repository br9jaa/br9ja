<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BR9ja</title>
  <meta name="description" content="Log in to BR9ja with your username or email and step into the mobile-first rewards flow.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://br9.ng/login">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <script defer src="./main.js"></script>
</head>
<body data-page="login" data-base=".">
  <div class="site-shell">
    <div data-site-shell></div>

    <main class="auth-shell">
      <section class="auth-card auth-card--login" data-auth-card>
        <div class="auth-card__header">
          <h1>Login</h1>
        </div>

        <form class="admin-form" data-form="auth-preview" data-auth-mode="login">
          <div class="field-group">
            <label for="login-identity">Username / Email / Phone</label>
            <div class="field-shell">
              <span class="field-icon">👤</span>
              <input id="login-identity" name="identity" type="text" placeholder="Username, email, or phone" required>
            </div>
          </div>

          <div class="field-group">
            <label for="login-password">Password / 6-Digit PIN</label>
            <div class="field-shell field-shell--with-action">
              <span class="field-icon">🔒</span>
              <input id="login-password" name="secret" type="password" placeholder="Password or PIN" required>
              <button class="field-inline-action" type="button" data-quick-login="device unlock" data-quick-login-inline aria-label="Use device unlock">
                <span class="field-inline-action__icon">◌</span>
              </button>
            </div>
          </div>

          <div class="login-utility-row">
            <label class="password-toggle" for="login-show-password">
              <input id="login-show-password" type="checkbox" data-toggle-password="#login-password">
              <span>Show Password</span>
            </label>
            <a class="inline-link" href="./reset-password.html">Forgot Password?</a>
          </div>
          <p class="success-banner" data-quick-login-feedback aria-live="polite"></p>

          <button class="action-button" type="submit">Login</button>

          <div class="auth-divider"></div>
          <p class="auth-footer-note">New here? <a href="./signup.html">Sign Up</a>.</p>
          <div class="success-banner" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <a class="floating-whatsapp" href="#" data-config-link="whatsappHelp" aria-label="Chat with BR9ja on WhatsApp"></a>
</body>
</html>
