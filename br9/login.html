<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BR9ja</title>
  <meta name="description" content="Log in to BR9ja with your username or email and step into the mobile-first rewards flow.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://br9.ng/login">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <script defer src="./main.js"></script>
</head>
<body data-page="login" data-base=".">
  <div class="site-shell">
    <div data-site-shell></div>

    <main class="auth-shell auth-shell--login">
      <section class="auth-card auth-card--login" data-auth-card>
        <form class="admin-form auth-form auth-form--login" data-form="auth-preview" data-auth-mode="login">
          <div class="auth-card__header" data-login-standard-header>
            <h1>Login</h1>
          </div>

          <section class="returning-login" data-login-returning hidden>
            <div class="returning-login__top">
              <div class="returning-login__avatar" aria-hidden="true" data-returning-initial>B</div>
              <a class="returning-login__lock" href="./contact.html" data-login-lock-account>
                <span>Lost your phone?</span>
                <strong>Lock your account</strong>
              </a>
            </div>

            <div class="returning-login__welcome">
              <p>Welcome back,</p>
              <h1 data-returning-name>BR9ja User</h1>
            </div>

            <div class="returning-login__unlock-card">
              <p class="returning-login__unlock-title">Fingerprint Unlock</p>
              <button class="returning-login__unlock-button" type="button" data-quick-login="fingerprint" aria-label="Use device unlock">
                <span class="returning-login__unlock-icon">◎</span>
              </button>
              <p class="success-banner" data-quick-login-feedback aria-live="polite"></p>
            </div>

            <button class="returning-login__fallback-toggle" type="button" data-login-fallback-toggle>
              Use Password Instead
            </button>
          </section>

          <div class="login-credentials" data-login-credentials>
            <div class="field-group" data-login-identity-group>
              <label for="login-identity">Username / Email / Phone</label>
              <div class="field-shell">
                <span class="field-icon">👤</span>
                <input id="login-identity" name="identity" type="text" placeholder="Username, email, or phone" required>
              </div>
            </div>

            <div class="field-group">
              <label for="login-password" data-login-secret-label>Password / 6-Digit PIN</label>
              <div class="field-shell field-shell--with-action">
                <span class="field-icon">🔒</span>
                <input id="login-password" name="secret" type="password" placeholder="Password or PIN" required>
                <button class="field-inline-action" type="button" data-toggle-password="#login-password" aria-label="Show value">
                  <span class="field-inline-action__icon">👁</span>
                </button>
              </div>
            </div>

            <div class="login-utility-row" data-login-utility-row>
              <a class="inline-link" href="./reset-password.html">Forgot Password?</a>
            </div>
          </div>

          <p class="success-banner" data-form-feedback aria-live="polite"></p>

          <button class="action-button" type="submit" data-login-submit>Login</button>

          <div class="auth-divider" data-login-divider></div>
          <p class="auth-footer-note" data-login-footer>New here? <a href="./signup.html">Sign Up</a>.</p>
        </form>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <a class="floating-whatsapp" href="#" data-config-link="whatsappHelp" aria-label="Chat with BR9ja on WhatsApp"></a>
</body>
</html>
