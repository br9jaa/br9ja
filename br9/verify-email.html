<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | BR9ja</title>
  <meta name="description" content="Verify your BR9ja email with the 6-digit code we sent you.">
  <meta name="theme-color" content="#010A1F">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://br9.ng/verify-email">
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/apple_touch_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <script defer src="./main.js"></script>
</head>
<body data-page="verify-email" data-base=".">
  <div class="site-shell">
    <div data-site-shell></div>

    <main class="auth-shell">
      <section class="auth-card auth-card--reset" data-auth-card>
        <div class="auth-card__header">
          <h1>Verify Email</h1>
          <p class="auth-card__copy">Enter the 6-digit code sent to <span data-verify-email>your email</span>.</p>
          <div class="auth-step-strip" aria-label="Email verification reward">
            <span class="auth-step-strip__reward">+100 BR9 Gold</span>
            <span class="auth-step-strip__note">This code expires in 10 minutes.</span>
          </div>
        </div>

        <form class="admin-form" data-form="email-verification">
          <div class="field-group">
            <div class="field-shell">
              <span class="field-icon">#</span>
              <input name="code" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit code" data-validate="otp" aria-label="Email verification code" required>
            </div>
          </div>

          <button class="action-button" type="submit">Verify Email</button>
          <button class="ghost-button" type="button" data-email-resend>Resend Code</button>
          <div class="success-banner" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <a class="floating-whatsapp" href="#" data-config-link="whatsappHelp" aria-label="Chat with BR9ja on WhatsApp"></a>
</body>
</html>
